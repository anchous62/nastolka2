<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Безопасный маршрут — игра по безопасности</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #1e3a2f, #0a1f18);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        /* Главное меню */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #2c4c3b, #0a1f17);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .menu-card {
            background: #fef0cf;
            padding: 25px 30px;
            border-radius: 70px 30px 70px 30px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 4px solid #ffcd94;
            max-width: 500px;
            width: 90%;
        }
        .menu-card h1 {
            font-size: 2.2rem;
            margin: 0;
            color: #b45f2b;
            text-shadow: 3px 3px 0 #ffdfa5;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        .menu-btn {
            background: #ffb347;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a4316;
        }
        .menu-btn:active {
            transform: translateY(3px);
        }
        /* Игровой интерфейс */
        .game-wrapper {
            display: none;
            width: 100%;
            max-width: 1300px;
        }
        .game-container {
            background: #f5e7d3;
            border-radius: 48px;
            padding: 15px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }
        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            background-color: #faf0e1;
            border-radius: 24px;
            padding: 12px;
            gap: 8px;
            border: 3px solid #c9a87b;
        }
        .cell {
            aspect-ratio: 1 / 1;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid #e7cfa1;
            position: relative;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .cell[data-type="question"] { background: #fff3cf; border-left: 8px solid #f4a100; }
        .cell[data-type="trap"] { background: #ffe0e0; border-left: 8px solid #d32f2f; }
        .cell[data-type="bonus"] { background: #d9f0ff; border-left: 8px solid #2e7eb0; }
        .cell[data-type="finish"] { background: #e8f0c0; border-left: 8px solid gold; }
        
        .cell-number {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 2px 8px;
            border-radius: 30px;
            position: absolute;
            top: 4px;
            left: 6px;
        }
        .player-marker {
            width: 38px;
            height: 38px;
            background: url('images/player.jpg') no-repeat center/contain;
            position: absolute;
            bottom: -5px;
            right: -5px;
            filter: drop-shadow(2px 2px 3px black);
            border-radius: 50%;
        }
        .player-marker::before {
            content: "🧑";
            font-size: 1.8rem;
            position: absolute;
        }
        .info-panel {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #2c1c0c;
            padding: 12px 20px;
            border-radius: 60px;
            color: #f9e2b7;
        }
        .stats {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        button {
            background: #ffcd7e;
            border: none;
            font-size: 1.1rem;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #b97f2e;
        }
        button:active {
            transform: translateY(2px);
        }
        .dice-area {
            background: white;
            border-radius: 24px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dice-img {
            width: 55px;
            height: 55px;
            background: #ddd;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .message {
            background: #f2e1b0;
            padding: 6px 15px;
            border-radius: 30px;
            color: #3b2a1f;
            max-width: 280px;
            font-size: 0.9rem;
        }
        @media (max-width: 700px) {
            .board { gap: 5px; padding: 6px; }
            .player-marker { width: 28px; height: 28px; }
            .dice-img { width: 45px; height: 45px; }
            .info-panel { gap: 8px; }
            button { font-size: 0.9rem; padding: 6px 12px; }
        }
        .trap-modal, .bonus-modal {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a1b;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 200;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 5px 15px black;
        }
    </style>
</head>
<body>

<!-- МЕНЮ -->
<div id="mainMenu" class="menu-overlay">
    <div class="menu-card">
        <h1>🛡️ БЕЗОПАСНЫЙ<br>МАРШРУТ</h1>
        <p>бросай кубик, отвечай на ситуации, избегай опасностей</p>
        <div class="menu-buttons">
            <button class="menu-btn" id="startGameBtn">🎲 СТАРТ ИГРЫ</button>
            <button class="menu-btn" id="menuResetBtn">🔄 СБРОС</button>
        </div>
        <p style="font-size:0.7rem;">✨ картинки .jpg в папке images/ (необязательно)</p>
    </div>
</div>

<!-- ИГРА -->
<div id="gameWrapper" class="game-wrapper">
    <div class="game-container">
        <div class="board" id="board"></div>
        <div class="info-panel">
            <div class="stats">🏆 Очки: <span id="scoreValue">0</span></div>
            <div class="dice-area">
                <div class="dice-img" id="diceDisplay">🎲</div>
                <button id="rollBtn">🎲 БРОСОК</button>
            </div>
            <button id="exitToMenuBtn">🏠 В меню</button>
            <div class="message" id="gameMsg">Бросай кубик!</div>
        </div>
    </div>
</div>

<script>
    // ------------------ КАРТОЧКИ (ваши сценарии) ------------------
    const BOARD_SIZE = 40;
    const FINISH_POS = 40;

    function buildBoard() {
        let cells = [];
        for (let i = 1; i <= BOARD_SIZE; i++) {
            let type = "normal";
            let action = null;
            // ----- СИТУАЦИИ (жёлтые) -----
            if (i === 3) { type = "question"; action = { 
                text: "В соцсети незнакомец представляется агентом модельного агентства, просит откровенные фото для портфолио.", 
                options: ["Пришлю, это шанс!", "Попрошу официальный договор", "Игнорирую и блокирую, скажу родителям"], 
                correct: 2, reward: 10 
            };}
            if (i === 6) { type = "question"; action = { 
                text: "Группа подростков предлагает прогуляться до места, где будет весело и можно заработать.", 
                options: ["Пойду с ними", "Скажу, что спешу домой", "Начну спорить"], 
                correct: 1, reward: 10 
            };}
            if (i === 9) { type = "question"; action = { 
                text: "Закрытая группа просит выполнить задание: украсть мелкое из магазина для вступления.", 
                options: ["Выполню", "Откажусь и покину группу", "Найду информацию о группе"], 
                correct: 1, reward: 10 
            };}
            if (i === 14) { type = "question"; action = { 
                text: "На карту пришли деньги от неизвестного, просит вернуть на ДРУГУЮ карту (ошибся реквизитами).", 
                options: ["Переведу сразу", "Проверю номер отправителя", "Обращусь в поддержку банка"], 
                correct: 2, reward: 12 
            };}
            if (i === 18) { type = "question"; action = { 
                text: "Реклама: 'Удвой деньги за 24 часа! Вложи 1000р получи 2000р'", 
                options: ["Вложу", "Поищу отзывы", "Расскажу друзьям"], 
                correct: 1, reward: 10 
            };}
            if (i === 22) { type = "question"; action = { 
                text: "В друзья добавляется 'знаменитость', признаётся в любви, потом шантажирует.", 
                options: ["Испугаюсь и сделаю всё", "Заблокирую и сохраню скриншоты", "Договорюсь с ним"], 
                correct: 1, reward: 12 
            };}
            if (i === 27) { type = "question"; action = { 
                text: "Предлагают работу курьером: забирать посылки и оставлять в других местах, не заглядывать внутрь. Высокая зарплата.", 
                options: ["Соглашусь", "Откажусь (похоже на преступление)", "Спрошу что внутри"], 
                correct: 1, reward: 10 
            };}
            if (i === 31) { type = "question"; action = { 
                text: "Новые друзья намекают: 'ты не свой', пока не сделаешь тату с их символом или поступок 'на слабо'.", 
                options: ["Сделаю", "Скажу нет, найду другую компанию", "Сделаю вид, что соглашусь"], 
                correct: 1, reward: 10 
            };}
            if (i === 35) { type = "question"; action = { 
                text: "Звонок из 'службы безопасности банка': просят код из СМС и CVV карты.", 
                options: ["Назову всё", "Перезвоню в банк по номеру на карте", "Задам вопросы сотруднику"], 
                correct: 1, reward: 12 
            };}
            if (i === 38) { type = "question"; action = { 
                text: "Нашёл бесхозный дорогой смартфон, экран разблокирован, банковские уведомления.", 
                options: ["Заберу себе", "Позвоню родственникам из контактов", "Отнесу в полицию/находку"], 
                correct: 2, reward: 15 
            };}

            // ----- ЛОВУШКИ (красные) -----
            if (i === 12) { type = "trap"; action = { 
                effect: "moveAndSkip", targetPos: 7, skip: true, msg: "❌ Ты решил заработать легкие деньги. Поймали на мелкой краже. Вернись на клетку 7 и пропусти ход!" 
            };}
            if (i === 16) { type = "trap"; action = { 
                effect: "moveTo", targetPos: 10, msg: "💸 Поверил мошеннику - потерял всё! Вернись на клетку 10." 
            };}
            if (i === 25) { type = "trap"; action = { 
                effect: "moveTo", targetPos: 1, msg: "👮 Тебя втянули в опасную компанию, полиция провела рейд. Вернись на старт!" 
            };}
            if (i === 33) { type = "trap"; action = { 
                effect: "skipTurns", skipCount: 2, msg: "⏳ Общался с подозрительными личностями. Пропусти 2 хода!" 
            };}

            // ----- БОНУСЫ (синие) -----
            if (i === 8) { type = "bonus"; action = { 
                effect: "extraRoll", msg: "📚 Ты прочитал статью о безопасности! Брось кубик ещё раз!" 
            };}
            if (i === 20) { type = "bonus"; action = { 
                effect: "addScore", addScore: 1, msg: "🤝 Ты поделился информацией о мошенниках! +1 очко." 
            };}
            if (i === 30) { type = "bonus"; action = { 
                effect: "moveForward", forward: 3, msg: "🧭 Нашёл безопасный путь! Переместись на 3 клетки вперёд." 
            };}
            if (i === FINISH_POS) type = "finish";

            cells.push({ id: i, type, action });
        }
        return cells;
    }

    let boardData = buildBoard();
    let currentPosition = 1;
    let score = 0;
    let gameActive = true;
    let awaitingQuestion = false;
    let extraRollNextTurn = false;
    let skipTurns = 0;        // пропуск ходов
    let gameMessage = "🎲 Бросай кубик!";
    
    const boardDiv = document.getElementById("board");
    const scoreSpan = document.getElementById("scoreValue");
    const rollBtn = document.getElementById("rollBtn");
    const exitBtn = document.getElementById("exitToMenuBtn");
    const msgDiv = document.getElementById("gameMsg");
    const diceDisplay = document.getElementById("diceDisplay");
    const mainMenuDiv = document.getElementById("mainMenu");
    const gameWrapperDiv = document.getElementById("gameWrapper");

    function setDiceImage(roll) {
        const img = new Image();
        img.onload = () => { diceDisplay.style.background = `url('images/dice_${roll}.jpg') center/contain`; diceDisplay.style.backgroundColor="white"; diceDisplay.innerText=""; };
        img.onerror = () => { diceDisplay.style.background=""; diceDisplay.innerText = ["⚀","⚁","⚂","⚃","⚄","⚅"][roll-1]; diceDisplay.style.fontSize="2.5rem"; };
        img.src = `images/dice_${roll}.jpg`;
    }

    function renderBoard() {
        boardDiv.innerHTML = "";
        for (let cell of boardData) {
            const div = document.createElement("div");
            div.className = "cell";
            div.setAttribute("data-type", cell.type);
            let imgMap = { question:"question.jpg", trap:"trap.jpg", bonus:"bonus.jpg", finish:"finish.jpg", normal:"cell_normal.jpg" };
            let imgFile = imgMap[cell.type];
            if(imgFile) div.style.backgroundImage = `url('images/${imgFile}')`;
            div.style.backgroundSize = "40px 40px";
            div.style.backgroundRepeat = "no-repeat";
            div.style.backgroundPosition = "center 30%";
            
            const numSpan = document.createElement("div");
            numSpan.className = "cell-number";
            numSpan.innerText = cell.id;
            div.appendChild(numSpan);
            
            let emoji = "⬜";
            if(cell.type === "question") emoji = "❓";
            else if(cell.type === "trap") emoji = "⚠️";
            else if(cell.type === "bonus") emoji = "✨";
            else if(cell.type === "finish") emoji = "🏁";
            const iconSpan = document.createElement("div");
            iconSpan.innerText = emoji;
            iconSpan.style.fontSize = "1.6rem";
            iconSpan.style.marginTop = "28px";
            div.appendChild(iconSpan);
            
            if(cell.id === currentPosition && gameActive) {
                const playerDiv = document.createElement("div");
                playerDiv.className = "player-marker";
                const testImg = new Image();
                testImg.onload = () => playerDiv.style.background = `url('images/player.jpg') center/contain`;
                testImg.onerror = () => playerDiv.style.background = "none";
                testImg.src = "images/player.jpg";
                div.appendChild(playerDiv);
            }
            boardDiv.appendChild(div);
        }
    }

    function updateUI() {
        scoreSpan.innerText = score;
        msgDiv.innerText = gameMessage;
        renderBoard();
    }

    function showQuestion(cell) {
        const q = cell.action;
        let ans = prompt(`${q.text}\n\n1️⃣ ${q.options[0]}\n2️⃣ ${q.options[1]}\n3️⃣ ${q.options[2]}\n\n👉 Введи номер ответа (1,2,3):`);
        if(ans === null) return false;
        let idx = parseInt(ans)-1;
        if(idx === q.correct) {
            score += q.reward;
            gameMessage = `✅ Верно! +${q.reward} очков!`;
            alert(`✅ Правильно! +${q.reward} очков.`);
        } else {
            score = Math.max(0, score - 5);
            gameMessage = `❌ Неверно! Правильный ответ: ${q.options[q.correct]}. -5 очков.`;
            alert(`❌ Ошибка! Правильный ответ: ${q.options[q.correct]}. -5 очков.`);
        }
        return true;
    }

    async function applyTrapEffect(cell) {
        let act = cell.action;
        gameMessage = act.msg;
        alert(act.msg);
        if(act.effect === "moveAndSkip") {
            currentPosition = act.targetPos;
            skipTurns = 1;
            updateUI();
            return true;
        }
        if(act.effect === "moveTo") {
            currentPosition = act.targetPos;
            updateUI();
            return true;
        }
        if(act.effect === "skipTurns") {
            skipTurns = act.skipCount;
            updateUI();
            return true;
        }
        return false;
    }

    async function applyBonusEffect(cell) {
        let act = cell.action;
        gameMessage = act.msg;
        alert(act.msg);
        if(act.effect === "extraRoll") {
            extraRollNextTurn = true;
        } else if(act.effect === "addScore") {
            score += act.addScore;
        } else if(act.effect === "moveForward") {
            let newPos = currentPosition + act.forward;
            if(newPos >= FINISH_POS) newPos = FINISH_POS;
            currentPosition = newPos;
            updateUI();
            if(currentPosition === FINISH_POS) finishGame();
            return true;
        }
        updateUI();
        return false;
    }

    async function movePlayer(steps) {
        if(!gameActive) return false;
        let newPos = currentPosition + steps;
        if(newPos >= FINISH_POS) {
            currentPosition = FINISH_POS;
            finishGame();
            return true;
        }
        currentPosition = newPos;
        let cell = boardData[currentPosition-1];
        
        if(cell.type === "question") {
            awaitingQuestion = true;
            showQuestion(cell);
            awaitingQuestion = false;
            updateUI();
            return true;
        }
        if(cell.type === "trap") {
            await applyTrapEffect(cell);
            updateUI();
            return true;
        }
        if(cell.type === "bonus") {
            await applyBonusEffect(cell);
            finishTurnAfterMove();
            return true;
        }
        finishTurnAfterMove();
        return true;
    }

    function finishTurnAfterMove() {
        updateUI();
    }

    async function handleDiceRoll() {
        if(awaitingQuestion) { alert("📢 Сначала ответь на вопрос!"); return; }
        if(!gameActive) { alert("Игра окончена, нажми Сброс или Новая игра."); return; }
        if(skipTurns > 0) {
            alert(`⏸️ Пропуск хода! Осталось пропусков: ${skipTurns}`);
            skipTurns--;
            updateUI();
            return;
        }
        let roll = Math.floor(Math.random()*6)+1;
        setDiceImage(roll);
        alert(`🎲 Выпало: ${roll}`);
        await movePlayer(roll);
        
        if(extraRollNextTurn && !awaitingQuestion && gameActive && currentPosition !== FINISH_POS) {
            extraRollNextTurn = false;
            alert("✨ БОНУС: дополнительный бросок!");
            let extraRoll = Math.floor(Math.random()*6)+1;
            setDiceImage(extraRoll);
            alert(`🎲 Бонусный бросок: ${extraRoll}`);
            await movePlayer(extraRoll);
        }
        updateUI();
        if(currentPosition === FINISH_POS) finishGame();
    }

    function finishGame() {
        gameActive = false;
        msgDiv.innerText = `🏆 ПОБЕДА! Финиш! Очки: ${score}. Нажми "В меню" для новой игры 🏆`;
        alert(`🏁 Ты победил! Итоговые очки: ${score}. Молодец!`);
        renderBoard();
    }

    function resetGameState() {
        boardData = buildBoard();
        currentPosition = 1;
        score = 0;
        gameActive = true;
        awaitingQuestion = false;
        extraRollNextTurn = false;
        skipTurns = 0;
        gameMessage = "Новая игра! Бросай кубик.";
        updateUI();
        setDiceImage(1);
    }

    // Меню и управление
    document.getElementById("startGameBtn").addEventListener("click", () => {
        resetGameState();
        mainMenuDiv.style.display = "none";
        gameWrapperDiv.style.display = "block";
    });
    document.getElementById("menuResetBtn").addEventListener("click", () => {
        resetGameState();
        alert("Прогресс сброшен. Нажми СТАРТ ИГРЫ чтобы играть.");
    });
    exitBtn.addEventListener("click", () => {
        mainMenuDiv.style.display = "flex";
        gameWrapperDiv.style.display = "none";
    });
    rollBtn.addEventListener("click", handleDiceRoll);
    
    resetGameState();
    mainMenuDiv.style.display = "flex";
    gameWrapperDiv.style.display = "none";
</script>
</body>
</html>
